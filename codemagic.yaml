workflows:
  android-debug:
    name: Android Debug Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      node: latest
      vars:
        PACKAGE_NAME: "com.resume"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Fix Image Assets (sips)
        script: |
          for file in assets/images/*.png; do
            sips -s format png "$file" --out "$file" || true
          done
      - name: Expo Prebuild
        script: npx expo prebuild --clean --no-interactive
      - name: Build Android Debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Get Android Fingerprints
        script: |
          cd android
          ./gradlew signingReport | grep -A 5 "debug"
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - your-email@example.com

  android-release:
    name: Android Release Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      groups:
        - google_play # Defined in Codemagic UI for signing
      vars:
        PACKAGE_NAME: "com.resume"
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Fix Image Assets (sips)
        script: |
          for file in assets/images/*.png; do
            sips -s format png "$file" --out "$file" || true
          done
      - name: Expo Prebuild
        script: npx expo prebuild --clean --no-interactive
      - name: Get Release SHA-1 Fingerprint & Prepare Keystore
        script: |
          if [ -n "$CM_KEYSTORE_BASE64" ]; then
            echo "Decoding Base64 Keystore from environment variables..."
            echo "$CM_KEYSTORE_BASE64" | base64 -D > android/app/release.keystore
            export CM_KEYSTORE_PATH="android/app/release.keystore"
            export CM_KEY_ALIAS="key"
            export CM_KEYSTORE_PASSWORD="resume123"
            export CM_KEY_PASSWORD="resume123"
          fi
          
          if [ -n "$CM_KEYSTORE_PATH" ] && [ -f "$CM_KEYSTORE_PATH" ]; then
            echo "Extracting SHA-1 from keystore..."
            keytool -list -v -keystore "$CM_KEYSTORE_PATH" -alias "$CM_KEY_ALIAS" -storepass "$CM_KEYSTORE_PASSWORD" | grep SHA1
          else
            echo "Release keystore path not found in environment. Ensure Android code signing is enabled in Codemagic UI."
          fi
      - name: Build Android Release
        script: |
          cd android
          chmod +x gradlew
          if [ -n "$CM_KEYSTORE_BASE64" ]; then
            # Use manual injected signing parameters
            ./gradlew bundleRelease assembleRelease \
              -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
              -Pandroid.injected.signing.store.password=resume123 \
              -Pandroid.injected.signing.key.alias=key \
              -Pandroid.injected.signing.key.password=resume123
          else
            # Rely on Codemagic Managed UI Signing
            ./gradlew bundleRelease assembleRelease
          fi
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - your-email@example.com
