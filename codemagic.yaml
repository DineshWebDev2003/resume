workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      groups:
        - google_play # Defined in Codemagic UI for signing
      vars:
        PACKAGE_NAME: "com.resume"
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Disable PNG Crunching (Fix AAPT2 Error)
        script: |
          mkdir -p android
          echo "android.enableAapt2=true" >> android/gradle.properties
          echo "android.useNewCruncher=false" >> android/gradle.properties
          # Force clean any old assets
          rm -rf android/app/src/main/res/drawable-*
      - name: Expo Prebuild
        script: npx expo prebuild --clean
      - name: Build Android Release
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - your-email@example.com
